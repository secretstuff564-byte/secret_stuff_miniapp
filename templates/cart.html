<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - Secret Stuff Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@800&display=swap" rel="stylesheet">
    <style>
        /* ... все стили остаются без изменений (они уже есть в вашем файле) ... */
        /* Я не буду дублировать весь CSS, оставлю тот же, что у вас */
    </style>
</head>
<body>

    <!-- Вся разметка шапки, меню, корзины, модалки – без изменений (как у вас) -->

    <script>
        const allProducts = {{ products|tojson|safe }};
        const staticBase = '{{ url_for("static", filename="") }}';
        const MANAGER_USERNAME = 'secret_manager_1';

        const CART_KEY = 'shopping_cart';

        function getCart() {
            return JSON.parse(localStorage.getItem(CART_KEY)) || [];
        }

        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }

        function renderCart() {
            const container = document.getElementById('cart-container');
            let cart = getCart();

            if (!cart.length) {
                container.innerHTML = `
                    <div class="cart-empty">
                        Здесь пока пусто<br>
                        <a href="{{ url_for('index') }}" class="continue-shopping">Вернуться к покупкам</a>
                    </div>
                `;
                return;
            }

            let html = `<div class="cart-items">`;
            let total = 0;
            cart.forEach((item) => {
                const product = allProducts.find(p => p.id === item.id);
                if (!product) return;
                const itemTotal = product.price * item.quantity;
                total += itemTotal;
                const firstImage = product.images[0];
                let details = [];
                if (item.color) details.push(`Цвет: ${item.color}`);
                if (item.size) details.push(`Размер: ${item.size}`);
                const detailsStr = details.length ? details.join(', ') : 'Без параметров';

                html += `
                    <div class="cart-item" data-id="${item.id}" data-color="${item.color || ''}" data-size="${item.size || ''}">
                        <img class="cart-item-img" src="${staticBase}${firstImage}" alt="${product.name}">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${product.name}</div>
                            <div class="cart-item-details">${detailsStr}</div>
                            <div class="cart-item-price">${product.price.toLocaleString()} ₽</div>
                        </div>
                        <div class="cart-item-quantity">
                            <button class="decr">-</button>
                            <span>${item.quantity}</span>
                            <button class="incr">+</button>
                        </div>
                        <button class="cart-item-remove">
                            <img src="${staticBase}trashcan.png" alt="Удалить">
                        </button>
                    </div>
                `;
            });
            html += `</div>`;
            html += `<div class="cart-total">Итого: ${total.toLocaleString()} ₽</div>`;
            html += `<button class="checkout-btn" id="checkout-btn">Оформить заказ</button>`;
            container.innerHTML = html;

            // Обработчики изменения количества (как раньше)
            document.querySelectorAll('.incr').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const cartItem = btn.closest('.cart-item');
                    const id = parseInt(cartItem.dataset.id);
                    const color = cartItem.dataset.color || null;
                    const size = cartItem.dataset.size || null;
                    changeQuantity(id, color, size, 1);
                });
            });
            document.querySelectorAll('.decr').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const cartItem = btn.closest('.cart-item');
                    const id = parseInt(cartItem.dataset.id);
                    const color = cartItem.dataset.color || null;
                    const size = cartItem.dataset.size || null;
                    changeQuantity(id, color, size, -1);
                });
            });
            document.querySelectorAll('.cart-item-remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const cartItem = btn.closest('.cart-item');
                    const id = parseInt(cartItem.dataset.id);
                    const color = cartItem.dataset.color || null;
                    const size = cartItem.dataset.size || null;
                    removeFromCart(id, color, size);
                });
            });

            // ===== ОБРАБОТЧИК ОФОРМЛЕНИЯ ЗАКАЗА (КОПИРОВАНИЕ + КОРОТКАЯ ССЫЛКА) =====
            const checkoutBtn = document.getElementById('checkout-btn');
            if (checkoutBtn) {
                checkoutBtn.addEventListener('click', function() {
                    const cart = getCart();
                    if (!cart || cart.length === 0) {
                        alert('Корзина пуста');
                        return;
                    }

                    if (!confirm('Подтвердите оформление заказа')) {
                        return;
                    }

                    checkoutBtn.disabled = true;
                    checkoutBtn.textContent = 'Оформление...';

                    const cartData = cart.map(item => {
                        const product = allProducts.find(p => p.id === item.id);
                        return {
                            id: item.id,
                            color: item.color || '',
                            size: item.size || '',
                            quantity: item.quantity,
                            price: product ? product.price : 0,
                            name: product ? product.name : 'Товар'
                        };
                    });
                    const total = cartData.reduce((sum, item) => sum + item.price * item.quantity, 0);

                    fetch('/checkout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ cart: cartData })
                    })
                    .then(response => response.json())
                    .then(data => {
                        checkoutBtn.disabled = false;
                        checkoutBtn.textContent = 'Оформить заказ';
                        if (data.success) {
                            localStorage.removeItem('shopping_cart');
                            renderCart();

                            // Формируем текст заказа для отправки менеджеру
                            let orderText = 'Новый заказ!\n\n';
                            cartData.forEach((item, idx) => {
                                orderText += `${idx+1}. ${item.name} (${item.color}, ${item.size}) × ${item.quantity}\n`;
                            });
                            orderText += `\nИтого: ${total} ₽`;

                            // Копируем текст в буфер обмена
                            const textarea = document.createElement('textarea');
                            textarea.value = orderText;
                            document.body.appendChild(textarea);
                            textarea.select();
                            document.execCommand('copy');
                            document.body.removeChild(textarea);

                            alert('Текст заказа скопирован в буфер обмена. Откроется диалог с менеджером – вставьте текст и отправьте.');

                            // Открываем диалог с менеджером (короткая ссылка)
                            const link = `tg://resolve?domain=${MANAGER_USERNAME}`;
                            if (window.Telegram && window.Telegram.WebApp) {
                                window.Telegram.WebApp.openTelegramLink(link);
                            } else {
                                window.open(link, '_blank');
                            }
                        } else {
                            alert('Ошибка оформления заказа: ' + (data.error || 'Неизвестная ошибка'));
                        }
                    })
                    .catch(error => {
                        checkoutBtn.disabled = false;
                        checkoutBtn.textContent = 'Оформить заказ';
                        console.error('Ошибка:', error);
                        alert('Не удалось оформить заказ. Проверьте соединение.');
                    });
                });
            }

            // Обработчик клика по карточке для модалки
            document.querySelectorAll('.cart-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.closest('button')) return;
                    const id = parseInt(this.dataset.id);
                    const color = this.dataset.color || null;
                    const size = this.dataset.size || null;
                    openEditModal(id, color, size);
                });
            });
        }

        // ---------- Модальное окно (без изменений) ----------
        // (здесь ваш код модалки, который уже есть)

        // ... остальные функции (changeQuantity, removeFromCart, renderCart, openEditModal и т.д.) остаются без изменений.

        renderCart();
    </script>

    <script src="{{ url_for('static', filename='header.js') }}"></script>
</body>
</html>
